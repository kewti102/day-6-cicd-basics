name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string

    outputs:
      short_sha:
        description: Short commit SHA
        value: ${{ jobs.build.outputs.short_sha }}

      owner:
        description: Repository owner (lowercase)
        value: ${{ jobs.build.outputs.owner }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      owner: ${{ steps.owner.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate short SHA
        id: vars
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Convert owner name
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/${{ inputs.image_name }}:sha-${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ steps.owner.outputs.value }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
