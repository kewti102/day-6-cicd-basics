name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  lint:
    name: Lint Source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Run Unit Tests
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Execute tests
        run: npm test
  build-image:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      owner: ${{ steps.owner.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Convert owner name
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
          ghcr.io/${{ steps.owner.outputs.value }}/demo-app:sha-${{ steps.vars.outputs.short_sha }}
          ghcr.io/${{ steps.owner.outputs.value }}/demo-app:latest
  trivy-scan:
    name: Scan image with Trivy
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ needs.build-image.outputs.owner }}/demo-app:sha-${{ needs.build-image.outputs.short_sha }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          
  generate-sbom:
    name: Generate SBOM
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ needs.build-image.outputs.owner }}/demo-app:sha-${{ needs.build-image.outputs.short_sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          
  upload-sbom:
    name: Upload SBOM
    needs: generate-sbom
    runs-on: ubuntu-latest

    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
